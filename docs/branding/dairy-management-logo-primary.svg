<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Dairy Management App Logo</title>
  <desc id="desc">A modern dairy logo with a milk drop, leaf accent, and brand text.</desc>
  <defs>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#79B79A"/>
      <stop offset="100%" stop-color="#47685A"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A9D46B"/>
      <stop offset="100%" stop-color="#6AAE4A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E3C30" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="36" fill="#F4F8F5"/>

  <g transform="translate(90,56)" filter="url(#softShadow)">
    <rect x="0" y="0" width="310" height="310" rx="72" fill="#FFFFFF"/>

    <path d="M157 42 C120 96 78 143 78 196 C78 247 113 281 157 281 C201 281 236 247 236 196 C236 143 194 96 157 42 Z" fill="url(#dropGrad)"/>

    <ellipse cx="157" cy="208" rx="55" ry="45" fill="#FFFFFF" fill-opacity="0.94"/>

    <path d="M194 84 C222 84 243 107 243 134 C217 132 195 111 194 84 Z" fill="url(#leafGrad)"/>
    <path d="M200 92 C205 108 220 123 236 128" stroke="#4D8A33" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>

  <g transform="translate(455,114)">
    <text x="0" y="108" font-family="Montserrat, Poppins, Segoe UI, sans-serif" font-size="96" font-weight="800" fill="#2D4338" letter-spacing="1.2">DAIRY</text>
    <text x="0" y="204" font-family="Montserrat, Poppins, Segoe UI, sans-serif" font-size="86" font-weight="700" fill="#47685A" letter-spacing="1">MANAGEMENT</text>
    <text x="4" y="254" font-family="Segoe UI, sans-serif" font-size="32" font-weight="600" fill="#6A8075" letter-spacing="2.4">FRESH OPERATIONS. EVERY DAY.</text>
  </g>
</svg>
